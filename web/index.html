<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8" />
<title>PULSO · Garvasa</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="icon" type="image/svg+xml" href="assets/pulso-icon.svg">
<link rel="icon" type="image/png" href="assets/icon-rojo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; min-height: 100%; background: #fafaf9; font-family: 'Inter Tight', Inter, system-ui, sans-serif; }
  * { box-sizing: border-box; }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 8px; border: 2px solid transparent; background-clip: padding-box; }
  ::-webkit-scrollbar-thumb:hover { background-color: #a8a29e; background-clip: padding-box; }
  input, button { font-family: inherit; }
  button:focus-visible { outline: 2px solid #1c1917; outline-offset: 2px; }
  details > summary { list-style: none; }
  details > summary::-webkit-details-marker { display: none; }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Splash mientras carga React + Babel */
  #__loading {
    position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
    flex-direction: column; gap: 16px; background: #fafaf9; z-index: 9999;
    transition: opacity 200ms;
  }
  #__loading.fade { opacity: 0; pointer-events: none; }
  #__loading .logo {
    display: flex; align-items: center; justify-content: center;
  }
  #__loading .logo img { height: 52px; width: auto; }
  #__loading .logo .logo-fallback {
    width: 52px; height: 52px; background: #dc2626; border-radius: 12px;
    display: grid; place-items: center; color: #fff; font-size: 26px; font-weight: 800;
    letter-spacing: -1px; box-shadow: 0 4px 14px rgba(220,38,38,0.25);
  }
  #__loading .text { font-size: 13px; color: #78716c; }
  #__error {
    position: fixed; bottom: 12px; left: 12px; right: 12px;
    background: #2a1215; color: #ff8a80; padding: 14px 18px; border-radius: 10px;
    border: 1px solid #5c2b2e; font: 12px/1.5 ui-monospace, monospace;
    white-space: pre-wrap; max-height: 40vh; overflow: auto; z-index: 99999;
    display: none;
  }
  #__error.visible { display: block; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
<div id="__loading">
  <div class="logo">
    <img src="assets/logo-rojo.png" alt="PULSO"
         onerror="this.style.display='none';this.nextElementSibling.style.display='grid'">
    <div class="logo-fallback" style="display:none">P</div>
  </div>
  <div class="text">Cargando PULSO…</div>
</div>
<div id="__error"></div>
<div id="root"></div>

<script>
  // Captura errores tempranos para mostrarlos en pantalla
  window.addEventListener("error", function(e) {
    // Solo mostrar errores de runtime JS (e.error definido).
    // Los errores de carga de recursos (scripts CDN sin red) tienen e.error=null
    // y e.message="" → producirían "[error] error" confuso; los ignoramos.
    if (!e.error) return;
    var box = document.getElementById("__error");
    box.classList.add("visible");
    box.textContent = "[error] " + (e.message || e.type) +
      (e.filename ? "\n  " + e.filename + ":" + e.lineno : "") +
      (e.error && e.error.stack ? "\n" + e.error.stack : "");
  }, true);

  // Hide splash once root has children
  var observer = new MutationObserver(function() {
    var root = document.getElementById("root");
    if (root && root.children.length > 0) {
      var l = document.getElementById("__loading");
      if (l) {
        l.classList.add("fade");
        setTimeout(function() { l.remove(); }, 250);
      }
      observer.disconnect();
    }
  });
  observer.observe(document.body, { childList: true, subtree: true });
</script>

<script src="src/data.js"></script>
<script src="src/api-shim.js"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/qr-pattern.jsx"></script>
<script type="text/babel" src="tweaks-panel.jsx"></script>
<script type="text/babel" src="src/word-preview.jsx"></script>
<script type="text/babel" src="src/queue-panel.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
<script type="text/babel" src="src/loader.jsx"></script>

<script type="text/babel" data-presets="env,react">
(() => {
  const params = new URLSearchParams(location.search);
  const mode = params.get("mode") || "supervisor";
  const Root = mode === "loader" ? window.LoaderApp : window.QRTekuApp;
  ReactDOM.createRoot(document.getElementById("root")).render(<Root />);
})();
</script>
</body>
</html>
