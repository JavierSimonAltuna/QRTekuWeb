  <polyline
    points="22,56 32,56 36.5,49 40,63 44,40 47.5,59 51,56 62,56"
    fill="none" stroke="rgba(255,255,255,0.75)" stroke-width="2.2"
    stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="62" y1="56" x2="100" y2="56" stroke="rgba(255,255,255,0.75)" stroke-width="2.2" stroke-linecap="round"/>
</svg>
