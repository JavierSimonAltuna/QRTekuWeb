<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo rojo redondeado -->
  <rect width="100" height="100" rx="22" ry="22" fill="#e63030"/>
  <!-- Letra P blanca centrada -->
  <text x="53" y="83"
    font-family="'Arial Black','Impact','Helvetica Neue',Arial,sans-serif"
    font-size="82" font-weight="900"
    fill="white" text-anchor="middle">P</text>
  <!-- Línea ECG blanca semitransparente — cruza a ~56% de altura -->
